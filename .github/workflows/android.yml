name: Build Rankify APK

on:
  push:
    branches: [ main ] # Jab bhi tum 'main' branch par code push karoge, ye chalega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor
        run: |
          # Agar capacitor.config.json nahi hai, toh ye use create karega
          npx cap init Rankify com.materialhub.app --web-dir dist
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

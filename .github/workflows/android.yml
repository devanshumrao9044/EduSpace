name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor & Force Sync 🛠️
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi

          # AGGRESSIVE FIX: Agar android folder hai par gradlew missing hai, toh usey delete karke naya banao
          if [ -d "android" ] && [ ! -f "android/gradlew" ]; then
            echo "Gradlew missing! Fixing android folder..."
            rm -rf android
          fi

          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: 🚀 LOGO & ICON GENERATION
        run: |
          mkdir -p assets
          if [ -f "logo.png" ]; then
            cp logo.png assets/icon-only.png
            cp logo.png assets/icon-foreground.png
            cp logo.png assets/icon-background.png
            cp logo.png assets/splash.png
            cp logo.png assets/splash-dark.png
            npx @capacitor/assets generate --android
          fi

      - name: Fix Kotlin & Permissions
        run: |
          cd android
          # Dobara check kar rahe hain taaki error na aaye
          if [ -f "gradlew" ]; then
            echo "android.useAndroidX=true" >> gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
            chmod +x gradlew
            ./gradlew clean
          else
            echo "Error: Gradlew still not found!"
            exit 1
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk

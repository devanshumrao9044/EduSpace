name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment (Java 21 & Node 20)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build React
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g
          npm run build

      - name: Capacitor Repair & Sync
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          # Fresh folder creation
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: ☢️ GRADLE CONFLICT FIXER (Master Fix)
        run: |
          mkdir -p ~/.gradle
          echo "allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.bouncycastle:bcprov-jdk18on:1.78'
                      force 'org.bouncycastle:bcpkix-jdk18on:1.78'
                  }
              }
          }" > ~/.gradle/init.gradle
          
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew

      - name: 🔨 Final Build
        run: |
          cd android
          # --init-script logic to bypass all JAR jhagdas
          ./gradlew assembleDebug --init-script ~/.gradle/init.gradle --no-daemon --max-workers=1 --no-parallel

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk

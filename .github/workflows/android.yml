name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # Sabhi plugins ko project ke andar install kar rahe hain taaki Vite ko mil sakein
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install --legacy-peer-deps
          # Assets tool globally theek hai
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor & Config Fix
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi

          if [ -d "android" ] && [ ! -f "android/gradlew" ]; then
            mkdir -p backup_manifest
            if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
              cp android/app/src/main/AndroidManifest.xml backup_manifest/
            fi
            rm -rf android
            npx cap add android
            if [ -f "backup_manifest/AndroidManifest.xml" ]; then
              mkdir -p android/app/src/main/
              cp backup_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            fi
            rm -rf backup_manifest
          elif [ ! -d "android" ]; then
            npx cap add android
          fi
          
          npx cap sync android

      - name: 🚀 LOGO & ICON GENERATION
        run: |
          mkdir -p assets
          if [ -f "logo.png" ]; then
            cp logo.png assets/icon-only.png
            cp logo.png assets/icon-foreground.png
            cp logo.png assets/icon-background.png
            cp logo.png assets/splash.png
            cp logo.png assets/splash-dark.png
            npx @capacitor/assets generate --android
          fi

      - name: Fix Kotlin & Permissions
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk

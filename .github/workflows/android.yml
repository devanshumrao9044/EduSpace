name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/assets @capacitor/preferences @capacitor/camera @capacitor/filesystem -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor & Config Fix
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          # 1. AGAR config file nahi hai, toh usey banao (appId missing error fix)
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi

          # 2. Manual folder fix logic
          if [ -d "android" ] && [ ! -f "android/gradlew" ]; then
            echo "Incomplete folder detected. Rebuilding while keeping your permissions..."
            mkdir -p backup_manifest
            # Tumhara banaya hua AndroidManifest backup le rahe hain
            if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
              cp android/app/src/main/AndroidManifest.xml backup_manifest/
            fi
            rm -rf android
            npx cap add android
            # Backup waali file wapas sahi jagah daal rahe hain
            if [ -f "backup_manifest/AndroidManifest.xml" ]; then
              mkdir -p android/app/src/main/
              cp backup_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            fi
            rm -rf backup_manifest
          elif [ ! -d "android" ]; then
            npx cap add android
          fi
          
          npx cap sync android

      - name: Fix Kotlin & Permissions
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          # Gradlew ko permission dena zaroori hai
          chmod +x gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

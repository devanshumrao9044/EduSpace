name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g
          npm run build

      - name: 🛠️ Capacitor Sync
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          # Fresh Android setup
          rm -rf android
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          
          npx cap add android
          npx cap sync android

      - name: 🚀 Asset Generation (Logo Fix)
        run: |
          # Check kar rahe hain ki logo.png root folder mein hai ya nahi
          if [ -f "logo.png" ]; then
            echo "✅ Logo mil gaya! Assets generate kar rahe hain..."
            mkdir -p assets
            # Capacitor by default 'icon.png' dhoondhta hai, isliye rename karke copy kar rahe hain
            cp logo.png assets/icon.png
            cp logo.png assets/splash.png
            
            # Ye command Android folder mein saare size ke logos set kar degi
            npx @capacitor/assets generate --android
          else
            echo "⚠️ ERROR: 'logo.png' tumhari repository ke main folder mein nahi mili! Isliye default logo aayega."
            echo "Solution: Apna logo 'logo.png' ke naam se upload karo aur push karo."
          fi

      - name: 🔨 SDK Upgrades & Final Build
        run: |
          cd android
          
          # Gradle Upgrade
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # Min SDK & Target SDK Upgrades
          sed -i 's/minSdkVersion = 22/minSdkVersion = 24/g' variables.gradle
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' variables.gradle
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/g' variables.gradle
          
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew
          
          # Clean aur Build
          ./gradlew clean assembleDebug --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk

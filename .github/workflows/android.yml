name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g
          npm run build

      - name: 🛠️ Capacitor Sync
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          # Fresh Android setup
          rm -rf android
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          
          npx cap add android
          npx cap sync android

      - name: 🚀 Asset Generation
        run: |
          mkdir -p assets
          cp logo.png assets/icon-only.png || true
          cp logo.png assets/splash.png || true
          npx @capacitor/assets generate --android || true

      - name: 🔨 SDK 35 Upgrade & Final Build
        run: |
          cd android
          
          # Gradle Upgrade (Jo pichli baar kaam kar gaya!)
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # 🚨 NAYA FIX: API 34 ko API 35 mein badal rahe hain 🚨
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' variables.gradle
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/g' variables.gradle
          
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew
          
          # Clean aur Build
          ./gradlew clean assembleDebug --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk

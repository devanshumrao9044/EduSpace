name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g
          npm run build

      - name: 🛠️ Capacitor Sync
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          # Android folder refresh
          rm -rf android
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          npx cap add android
          npx cap sync android

      - name: 🚀 Asset Generation
        run: |
          mkdir -p assets
          cp logo.png assets/icon-only.png || true
          cp logo.png assets/splash.png || true
          npx @capacitor/assets generate --android || true

      - name: 🔨 Build Android APK (The Cache-Killer Fix)
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          chmod +x gradlew

          # 🚨 SABSE BADA FIX: GitHub ka corrupt cache jadd se uda do 🚨
          echo "Wiping out corrupted Gradle caches..."
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/dists/

          # --refresh-dependencies Gradle ko majboor karega fresh files laane ke liye
          ./gradlew assembleDebug --no-daemon --refresh-dependencies --max-workers=1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/assets @capacitor/preferences @capacitor/camera @capacitor/filesystem -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor & Fix Manual Folders
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          # Agar 'android' folder hai par 'gradlew' nahi, toh ye incomplete hai
          if [ -d "android" ] && [ ! -f "android/gradlew" ]; then
            echo "Incomplete android folder detected. Fixing..."
            # User ka manifest bachane ke liye backup le rahe hain
            mkdir -p backup_manifest
            cp -r android/app/src/main/* backup_manifest/ || true
            rm -rf android
            npx cap add android
            # Manifest ko wapas sahi jagah daal rahe hain
            cp -r backup_manifest/* android/app/src/main/ || true
            rm -rf backup_manifest
          elif [ ! -d "android" ]; then
            npx cap add android
          fi
          
          npx cap sync android

      - name: Fix Kotlin & Permissions
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Essential Dependencies
        run: |
          npm install --legacy-peer-deps
          # Vite build ke liye plugins ko project mein save karna zaroori hai
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: 🛠️ Capacitor Setup & Repair
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi

          # Agar folder corrupt hai toh naya banao
          if [ -d "android" ] && [ ! -f "android/gradlew" ]; then
            rm -rf android
          fi

          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: 🚀 LOGO & ICON GENERATION
        run: |
          mkdir -p assets
          if [ -f "logo.png" ]; then
            cp logo.png assets/icon-only.png
            cp logo.png assets/icon-foreground.png
            cp logo.png assets/icon-background.png
            cp logo.png assets/splash.png
            cp logo.png assets/splash-dark.png
            npx @capacitor/assets generate --android
          fi

      - name: ☢️ NUCLEAR CONFLICT FIXER (The Final Cure)
        run: |
          cd android
          # 1. Force use of AndroidX and Jetifier
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. Force Gradle to use ONLY version 1.78 of BouncyCastle (bcprov)
          # Ye line build.gradle mein 'allprojects' ke andar resolution strategy ghusa degi
          sed -i '/allprojects {/a \    configurations.all { resolutionStrategy { force "org.bouncycastle:bcprov-jdk18on:1.78" } }' build.gradle
          
          # 3. Clean environment
          chmod +x gradlew
          ./gradlew clean

      - name: 🔨 Final Build Execution
        run: |
          cd android
          # Workers=1 aur no-daemon taaki memory jhagda na ho
          ./gradlew assembleDebug --no-daemon --max-workers=1 --no-parallel

      - name: 📤 Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Fixed-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

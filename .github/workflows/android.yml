name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # legacy-peer-deps zaroori hai conflicts rokne ke liye
          npm install --legacy-peer-deps
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor
        run: |
          # VERSION FIX: Hum v6 force kar rahe hain taaki build crash na ho
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init Rankify com.materialhub.app --web-dir dist
          fi
          
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate App Icons
        run: |
          if [ -f "logo.png" ]; then
            # Capacitor Assets tool use karke icons generate karo
            npx @capacitor/assets generate --android --icon-path logo.png
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin Duplicate Class Error
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-App-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk

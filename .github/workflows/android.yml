name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g
          npm run build

      - name: 🛠️ Capacitor Sync & Folder Repair
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          
          # Force refresh android folder
          rm -rf android
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          npx cap add android
          npx cap sync android

      - name: 🚀 LOGO GENERATION
        run: |
          mkdir -p assets
          cp logo.png assets/icon-only.png || true
          cp logo.png assets/splash.png || true
          npx @capacitor/assets generate --android || true

      - name: ☢️ DEEP GRADLE FIX (The Ultimate Solution)
        run: |
          cd android
          # 1. Root build.gradle mein 'subprojects' configuration inject karna
          # Ye har ek plugin (filesystem, camera etc.) ko force karega 1.78 use karne ke liye
          sed -i '/allprojects {/a \    subprojects { \
              project.configurations.all { \
                  resolutionStrategy.eachDependency { details -> \
                      if (details.requested.group == "org.bouncycastle") { \
                          details.useVersion "1.78" \
                      } \
                  } \
              } \
          }' build.gradle

          # 2. gradle.properties mein memory fix
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          
          chmod +x gradlew

      - name: 🔨 Final Build Execution
        run: |
          cd android
          # --no-daemon aur workers=1 taaki jar file lock na ho
          ./gradlew assembleDebug --no-daemon --max-workers=1 --no-parallel

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk

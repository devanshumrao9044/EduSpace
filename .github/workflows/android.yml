name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: 🛠️ Capacitor Setup & Repair
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          
          if [ -d "android" ]; then
            # Pura purana kachra saaf karo
            rm -rf android/.gradle
            npx cap sync android
          else
            npx cap add android
          fi

      - name: 🚀 LOGO & ICON GENERATION
        run: |
          mkdir -p assets
          if [ -f "logo.png" ]; then
            cp logo.png assets/icon-only.png
            cp logo.png assets/icon-foreground.png
            cp logo.png assets/icon-background.png
            cp logo.png assets/splash.png
            cp logo.png assets/splash-dark.png
            npx @capacitor/assets generate --android
          fi

      - name: ☢️ SYSTEM-LEVEL JAR FIX (The Final Solution)
        run: |
          # Gradle ke home directory mein master fix daal rahe hain
          mkdir -p ~/.gradle
          echo "allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.bouncycastle:bcprov-jdk18on:1.78'
                      force 'org.bouncycastle:bcpkix-jdk18on:1.78'
                  }
              }
          }" > ~/.gradle/init.gradle
          
          # Android folder ke andar ke conflict ko bhi force-fix karo
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew

      - name: 🔨 Build Android APK
        run: |
          cd android
          # --no-daemon aur workers=1 taaki koi file lock na ho
          ./gradlew assembleDebug --no-daemon --max-workers=1 --no-parallel

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Rankify APK

on:
  push:
    branches: [ main ] # Jab bhi tum 'main' branch par code push karoge, ye chalega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor
        run: |
          # Capacitor aur Android tools install karna
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Agar config file nahi hai toh naya project init karo
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            # NOTE: Agar build folder 'build' hai toh 'dist' ko 'build' kar dena
            npx cap init Rankify com.materialhub.app --web-dir dist
          fi
          
          # Android folder add karna
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin Duplicate Class Error
        # Ye step duplicate libraries ki ladayi khatam karega
        run: |
          echo "
          subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Build Android APK (Debug)
        run: |
          cd android
          # Gradle ko permission dena
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-App-Package
          path: android/app/build/outputs/apk/debug/app-debug.apk

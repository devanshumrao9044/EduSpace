name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # legacy-peer-deps conflicts rokne ke liye
          npm install --legacy-peer-deps
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init Rankify com.materialhub.app --web-dir dist
          fi
          if [ ! -d "android" ]; then
            npx cap add android || true
          fi

      - name: Generate App Icons
        # Yahan humne '--icon-path' hata diya hai aur default behaviour use kiya hai
        run: |
          if [ -f "logo.png" ]; then
            # Logo ko tool ke hisaab se sahi jagah copy kar rahe hain
            mkdir -p assets
            cp logo.png assets/logo.png
            # Tool ko bina extra flags ke chala rahe hain taaki crash na ho
            npx @capacitor/assets generate --android || echo "Icon generation failed, but continuing build..."
          fi
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin Duplicate Class Error
        run: |
          cd android
          echo "android.useAndroidX=true" >> local.properties
          echo "android.enableJetifier=true" >> local.properties

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Fix-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          # Logo banane wala tool install karna
          npm install @capacitor/assets -g

      - name: Build React Project
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init Rankify com.materialhub.app --web-dir dist
          fi
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate App Icons
        run: |
          # Agar logo.png maujood hai, toh icons generate karo
          if [ -f "logo.png" ]; then
            mkdir -p assets
            cp logo.png assets/icon-only.png
            cp logo.png assets/icon-foreground.png
            cp logo.png assets/icon-background.png
            npx capacitor-assets generate --android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin Duplicate Class Error
        run: |
          echo "
          subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-App-With-Logo
          path: android/app/build/outputs/apk/debug/app-debug.apk

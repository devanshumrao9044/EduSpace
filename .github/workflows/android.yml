name: Build Rankify APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build React
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/filesystem @capawesome/capacitor-file-picker --save --legacy-peer-deps
          npm install @capacitor/assets -g
          npm run build

      - name: 🛠️ Capacitor Sync
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 --legacy-peer-deps
          # Folder refresh
          rm -rf android
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.materialhub.app", "appName": "Rankify", "webDir": "dist"}' > capacitor.config.json
          fi
          npx cap add android
          npx cap sync android

      - name: 🚀 Asset Generation
        run: |
          mkdir -p assets
          cp logo.png assets/icon-only.png || true
          cp logo.png assets/splash.png || true
          npx @capacitor/assets generate --android || true

      - name: ☢️ THE FINAL BCPROV CURE
        run: |
          cd android
          
          # 1. build.gradle ke ekdum niche force-fix append karna
          # Ye har sub-project (plugins) ko majboor karega 1.78 use karne ke liye
          echo "
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.bouncycastle:bcprov-jdk18on:1.78'
                      force 'org.bouncycastle:bcpkix-jdk18on:1.78'
                  }
              }
          }
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.bouncycastle:bcprov-jdk18on:1.78'
                      force 'org.bouncycastle:bcpkix-jdk18on:1.78'
                  }
              }
          }
          " >> build.gradle

          # 2. Properties setup
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          chmod +x gradlew

      - name: 🔨 Build Android APK
        run: |
          cd android
          # --no-daemon aur workers=1 taaki dependency resolve hone mein lock na ho
          ./gradlew assembleDebug --no-daemon --max-workers=1 --no-parallel

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rankify-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
